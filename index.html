<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestBorne - Rise Through Discipline</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo-icon">⚔️</div>
                <h1 class="logo-title">QuestBorne</h1>
                <p class="logo-subtitle">Rise Through Discipline</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h2>Welcome Back, Hero</h2>
                <div class="input-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="hero@questborne.com" required>
                    <span class="input-icon">📧</span>
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Your secret phrase..." required>
                    <span class="input-icon">🔒</span>
                </div>
                <button type="submit" class="btn-primary">Enter the Realm</button>
                <p class="auth-switch">
                    New to QuestBorne?
                    <a href="#" id="show-register">Create Your Hero</a>
                </p>
                <div id="login-error" class="error-message"></div>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form">
                <h2>Forge Your Legend</h2>
                <div class="input-group">
                    <label for="reg-username">Hero Name</label>
                    <input type="text" id="reg-username" placeholder="What shall they call you?" required minlength="3">
                    <span class="input-icon">🛡️</span>
                </div>
                <div class="input-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="hero@questborne.com" required>
                    <span class="input-icon">📧</span>
                </div>
                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="Min 6 characters..." required minlength="6">
                    <span class="input-icon">��</span>
                </div>
                <div class="input-group">
                    <label for="reg-password-confirm">Confirm Password</label>
                    <input type="password" id="reg-password-confirm" placeholder="Repeat your phrase..." required>
                    <span class="input-icon">🔒</span>
                </div>

                <!-- Class Selection -->
                <div class="class-selection">
                    <label>Choose Your Path</label>
                    <div class="class-options">
                        <div class="class-option" data-class="warrior">
                            <span class="class-icon">⚔️</span>
                            <span class="class-name">Warrior</span>
                            <span class="class-desc">+2 STR, +1 CON</span>
                        </div>
                        <div class="class-option" data-class="ranger">
                            <span class="class-icon">🏹</span>
                            <span class="class-name">Ranger</span>
                            <span class="class-desc">+2 DEX, +1 WIS</span>
                        </div>
                        <div class="class-option" data-class="mage">
                            <span class="class-icon">🔮</span>
                            <span class="class-name">Mage</span>
                            <span class="class-desc">+2 INT, +1 WIS</span>
                        </div>
                        <div class="class-option" data-class="bard">
                            <span class="class-icon">🎵</span>
                            <span class="class-name">Bard</span>
                            <span class="class-desc">+2 CHA, +1 DEX</span>
                        </div>
                    </div>
                    <input type="hidden" id="reg-class" value="">
                </div>

                <button type="submit" class="btn-primary">Begin Your Quest</button>
                <p class="auth-switch">
                    Already a hero?
                    <a href="#" id="show-login">Return to Login</a>
                </p>
                <div id="register-error" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
