<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Forge - RPG Task Tracker</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <h1 class="game-title">⚔️ Quest Forge ⚔️</h1>
                <p class="tagline">Forge Your Destiny Through Daily Quests</p>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="register">Register</button>
                </div>
                
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Enter the Realm</button>
                    <p id="login-error" class="error-message"></p>
                </form>
                
                <form id="register-form" class="auth-form">
                    <div class="form-group">
                        <label for="register-username">Choose Your Name</label>
                        <input type="text" id="register-username" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="register-password">Create Password</label>
                        <input type="password" id="register-password" required minlength="4">
                    </div>
                    <div class="form-group">
                        <label for="register-confirm">Confirm Password</label>
                        <input type="password" id="register-confirm" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Begin Your Journey</button>
                    <p id="register-error" class="error-message"></p>
                    <p id="register-success" class="success-message"></p>
                </form>
            </div>
        </div>

        <!-- Main Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Top Navigation -->
            <nav class="top-nav">
                <div class="nav-left">
                    <span class="game-logo">⚔️ Quest Forge</span>
                </div>
                <div class="nav-center">
                    <button class="nav-btn active" data-view="dashboard">📊 Dashboard</button>
                    <button class="nav-btn" data-view="tasks">📜 Quests</button>
                    <button class="nav-btn" data-view="character">🛡️ Hero</button>
                    <button class="nav-btn" data-view="dungeon">🏰 Dungeon</button>
                </div>
                <div class="nav-right">
                    <span id="user-display" class="user-name"></span>
                    <button id="logout-btn" class="btn btn-small">Logout</button>
                </div>
            </nav>

            <!-- Mobile Navigation -->
            <nav class="mobile-nav">
                <button class="mobile-nav-btn active" data-view="dashboard">📊</button>
                <button class="mobile-nav-btn" data-view="tasks">📜</button>
                <button class="mobile-nav-btn" data-view="character">🛡️</button>
                <button class="mobile-nav-btn" data-view="dungeon">🏰</button>
            </nav>

            <!-- Main Content Area -->
            <main class="main-content">
                <!-- Dashboard View -->
                <div id="dashboard-view" class="view active">
                    <div class="dashboard-grid">
                        <!-- Character Quick View -->
                        <div class="card character-quick">
                            <h2>Your Hero</h2>
                            <div id="quick-character-display"></div>
                        </div>
                        
                        <!-- Today's Tasks -->
                        <div class="card today-tasks">
                            <h2>Today's Quests</h2>
                            <div id="today-tasks-list"></div>
                        </div>
                        
                        <!-- Daily Habits -->
                        <div class="card daily-habits">
                            <h2>Daily Disciplines</h2>
                            <div id="daily-habits-list"></div>
                        </div>
                        
                        <!-- Dungeon Progress -->
                        <div class="card dungeon-quick">
                            <h2>Dungeon Progress</h2>
                            <div id="dungeon-quick-display"></div>
                        </div>
                    </div>
                </div>

                <!-- Tasks View -->
                <div id="tasks-view" class="view">
                    <div class="tasks-container">
                        <div class="tasks-header">
                            <h2>Quest Board</h2>
                            <button id="add-task-btn" class="btn btn-primary">+ New Quest</button>
                        </div>
                        
                        <div class="tasks-filters">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="work">💼 Work</button>
                            <button class="filter-btn" data-filter="fitness">💪 Fitness</button>
                            <button class="filter-btn" data-filter="music">🎵 Music</button>
                            <button class="filter-btn" data-filter="habits">🔄 Habits</button>
                            <button class="filter-btn" data-filter="other">📌 Other</button>
                        </div>
                        
                        <div id="tasks-list" class="tasks-list"></div>
                    </div>
                </div>

                <!-- Character View -->
                <div id="character-view" class="view">
                    <div class="character-container">
                        <div id="character-display"></div>
                    </div>
                </div>

                <!-- Dungeon View -->
                <div id="dungeon-view" class="view">
                    <div class="dungeon-container">
                        <div id="dungeon-display"></div>
                    </div>
                </div>
            </main>
        </div>

        <!-- Modals -->
        <div id="modal-overlay" class="modal-overlay">
            <div id="modal-content" class="modal-content"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/character.js"></script>
    <script src="js/tasks.js"></script>
    <script src="js/dungeon.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
